<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1e"/>
      <stop offset="50%" stop-color="#151233"/>
      <stop offset="100%" stop-color="#0e1a2b"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1400" height="400" fill="url(#bgGrad)"/>
  <rect width="1400" height="400" fill="url(#grid)"/>

  <!-- ambient glows -->
  <circle cx="1180" cy="90" r="220" fill="url(#glow1)" filter="url(#softBlur)"/>
  <circle cx="150" cy="330" r="200" fill="url(#glow2)" filter="url(#softBlur)"/>

  <!-- decorative circuit nodes (right side) -->
  <g stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M 1020 60 L 1090 60 L 1090 110 L 1160 110"/>
    <path d="M 1050 200 L 1120 200 L 1120 160"/>
    <path d="M 1000 300 L 1070 300 L 1070 260 L 1150 260"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="1020" cy="60" r="4"/>
    <circle cx="1160" cy="110" r="4"/>
    <circle cx="1050" cy="200" r="4"/>
    <circle cx="1120" cy="160" r="4"/>
    <circle cx="1000" cy="300" r="4"/>
    <circle cx="1150" cy="260" r="4"/>
  </g>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1400" height="6" fill="url(#barGrad)"/>

  <!-- eyebrow -->
  <text x="90" y="118" font-family="Consolas, 'Courier New', monospace" font-size="20" fill="#22d3ee" letter-spacing="4">
    &gt; ./whoami --role=ai-engineer
  </text>

  <!-- name -->
  <text x="88" y="205" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="url(#nameGrad)" letter-spacing="1">
    MOHAMMED ANAS
  </text>

  <!-- tagline -->
  <text x="90" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#cbd5e1" font-weight="400">
    AI Engineer &#8212; Generative AI &#183; Agentic Systems &#183; RAG &#183; Voice AI
  </text>

  <!-- divider -->
  <rect x="90" y="278" width="200" height="3" rx="1.5" fill="url(#barGrad)"/>

  <!-- stack chips -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e2e8f0">
    <g>
      <rect x="90" y="310" width="112" height="34" rx="17" fill="#1e1b4b" stroke="#6366f1" stroke-opacity="0.6"/>
      <text x="146" y="332" text-anchor="middle">LangChain</text>
    </g>
    <g>
      <rect x="212" y="310" width="112" height="34" rx="17" fill="#1e1b4b" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <text x="268" y="332" text-anchor="middle">LangGraph</text>
    </g>
    <g>
      <rect x="334" y="310" width="88" height="34" rx="17" fill="#1e1b4b" stroke="#06b6d4" stroke-opacity="0.6"/>
      <text x="378" y="332" text-anchor="middle">FastAPI</text>
    </g>
    <g>
      <rect x="432" y="310" width="72" height="34" rx="17" fill="#1e1b4b" stroke="#3b82f6" stroke-opacity="0.6"/>
      <text x="468" y="332" text-anchor="middle">RAG</text>
    </g>
    <g>
      <rect x="514" y="310" width="102" height="34" rx="17" fill="#1e1b4b" stroke="#d946ef" stroke-opacity="0.6"/>
      <text x="565" y="332" text-anchor="middle">Voice AI</text>
    </g>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="394" width="1400" height="6" fill="url(#barGrad)"/>
</svg>
